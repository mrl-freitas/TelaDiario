<ion-content [fullscreen]="true">
  <div class="container">
    <div class="wrapper">
      <h1>Cadastro</h1>
      <!-- Título simples -->

      <!-- e-mail -->
      <ion-item class="email-field-container" fill="underline">
        <ion-input
          type="email"
          placeholder="E-mail"
          class="login-field-input"
        ></ion-input>
      </ion-item>

      <!-- primeiro input: senha  -->
      <ion-item class="senha-field-container" fill="underline">
        <ion-input
          class="senha-field-input"
          type="password"
          placeholder="Senha"
          [type]="isPasswordVisibleA ? 'text' : 'password'"
        ></ion-input>

        <div class="eye-icon-container" (click)="togglePasswordA()">
          @if (isPasswordVisibleA) {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="eye-svg"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />

            <circle cx="12" cy="12" r="3" />
          </svg>
          } @else {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="eye-svg"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
            />

            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />

            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
          }
        </div>
      </ion-item>

      <!-- segundo input: senha  -->
      <ion-item class="senha-field-container" fill="underline">
        <ion-input
          class="senha-field-input"
          type="password"
          placeholder="Senha"
          [type]="isPasswordVisibleB ? 'text' : 'password'"
        ></ion-input>

        <div class="eye-icon-container" (click)="togglePasswordB()">
          @if (isPasswordVisibleB) {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="eye-svg"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />

            <circle cx="12" cy="12" r="3" />
          </svg>
          } @else {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="eye-svg"
          >
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
            />

            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />

            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
          }
        </div>
      </ion-item>

      <ion-button expand="block">CRIAR UMA CONTA</ion-button>
    </div>

    <div class="signup-wrapper">
      <p class="signup-text">Possui uma conta ?</p>
      <a class="signup-link" routerLink="/login">Fazer Login</a>
    </div>
  </div>
</ion-content>
