<ion-content [fullscreen]="true">
  <section class="detalhes-filme">
    <div class="banner-filme">
      <img [src]="imagemBanner" [alt]="filme.title" />

      <ion-button fill="clear" class="botao-voltar" (click)="voltar()">
        <span aria-hidden="true">&lt;</span>
      </ion-button>
    </div>

    <div class="conteudo-filme">
      <div class="cabecalho-filme">
        <h1>{{ filme.title }}</h1>

        <div class="acoes-filme">
          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="alternarAssistir()"
          >
            <img
              [src]="filme.assistir ? 'assets/icon/Assistir_marcado.png' : 'assets/icon/Assistir.png'"
              [alt]="filme.assistir ? 'Remover de assistir' : 'Marcar para assistir'"
            />
          </ion-button>

          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="alternarFavorito()"
          >
            <img
              [src]="filme.favorito ? 'assets/icon/Favorito_marcado.png' : 'assets/icon/Favorito.png'"
              [alt]="filme.favorito ? 'Escolher outra pasta favorita' : 'Escolher pasta favorita'"
            />
          </ion-button>
        </div>
      </div>

      <p class="sinopse">{{ sinopse }}</p>

      <button type="button" class="ver-mais">Ver mais</button>
    </div>
  </section>

  <!-- Modal -->>
  <div
    class="fundo-seletor-pastas"
    *ngIf="seletorPastasAberto"
    (click)="fecharSeletorPastas()"
  >
    <section
      class="container-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="titulo-pastas"
      (click)="$event.stopPropagation()"
    >
      <div class="content-close-button">
        <button
          type="button"
          class="close-button"
          aria-label="Fechar"
          (click)="fecharSeletorPastas()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="container-folder-search">
        <input
          type="search"
          class="folder-search"
          placeholder="Pesquisar..."
          [value]="buscaPasta"
          (input)="atualizarBuscaPasta($event)"
        />
      </div>

      <div class="container-folders">
        <h2 class="title-folder">Pastas</h2>

        <div class="content-folders-list">
          <button
            type="button"
            class="folder-item"
            *ngFor="let pasta of pastasFiltradas"
            [class.pasta-selecionada]="pasta.nome === pastaFavoritaSelecionada"
            (click)="selecionarPasta(pasta.nome)"
          >
            <span class="folder-icon" aria-hidden="true"></span>
            <span>{{ pasta.nome }}</span>
          </button>
        </div>
      </div>

      <div class="container-create-folder">
        <button
          type="button"
          class="button-create-folder"
          (click)="criarPasta()"
        >
          CRIAR
        </button>
      </div>
    </section>
  </div>
</ion-content>
