<ion-content [fullscreen]="true">
  <!-- GUARDA PRINCIPAL (evita erro de filme undefined) -->
  <section class="detalhes-filme" *ngIf="filme; else loading">
    <!-- BANNER -->
    <div class="banner-filme">
      <img [src]="imagemBanner" [alt]="filme?.title" />

      <ion-button fill="clear" class="botao-voltar" (click)="voltar()">
        <span aria-hidden="true">&lt;</span>
      </ion-button>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo-filme">
      <div class="cabecalho-filme">
        <h1>{{ filme?.title }}</h1>

        <div class="acoes-filme">
          <!-- ASSISTIDO -->
          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="toggleAssistido()"
          >
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M5 12L10 17L19 7"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
                [attr.stroke]="isAssistido ? '#ffffff' : '#B2B2B2'"
              />
              <path
                d="M5 12L10 17L19 7"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
                [attr.stroke]="isAssistido ? '#ffffff' : '#1D1D1D'"
              />
            </svg>
          </ion-button>

          <!-- FAVORITO -->
          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="abrirSeletorPastas()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="28"
              height="28"
              [attr.fill]="isFavorite ? '#ffffff' : 'none'"
              [style.stroke]="isAssistido ? '#ffffff' : '#B2B2B2'"
              stroke-width="1"
            >
              <path
                d="M12 21s-7-4.6-9.5-8.2C.6 9.2 2.3 5.8 5.8 5.1 7.7 4.7 9.6 5.5 12 8
           c2.4-2.5 4.3-3.3 6.2-2.9 3.5.7 5.2 4.1 3.3 7.7C19 16.4 12 21 12 21z"
              />
            </svg>
          </ion-button>
        </div>
      </div>

      <!-- SINOPSE -->
      <p class="sinopse" [class.expandida]="sinopseExpandida">
        {{ sinopseExibida }}
      </p>

      <button type="button" class="ver-mais" (click)="sinopseExpandidaToggle()">
        {{ sinopseExpandida ? 'Ver menos' : 'Ver mais' }}
      </button>
    </div>
  </section>

  <!-- LOADING -->
  <ng-template #loading>
    <div class="loading-container">
      <p>Carregando filme...</p>
    </div>
  </ng-template>

  <!-- MODAL PASTAS -->
  <div
    class="fundo-seletor-pastas"
    *ngIf="seletorPastasAberto"
    (click)="fecharSeletorPastas()"
  >
    <section
      class="container-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="titulo-pastas"
      (click)="$event.stopPropagation()"
    >
      <!-- FECHAR -->
      <div class="content-close-button">
        <button
          type="button"
          class="close-button"
          aria-label="Fechar"
          (click)="fecharSeletorPastas()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- BUSCA -->
      <div class="container-folder-search">
        <input
          type="search"
          class="folder-search"
          placeholder="Pesquisar..."
          (input)="atualizarBuscaPasta($event)"
        />
      </div>

      <!-- LISTA PASTAS -->
      <div class="container-folders">
        <h2 class="title-folder">Pastas</h2>

        <div class="content-folders-list">
          <button
            type="button"
            class="folder-item"
            *ngFor="let pasta of pastasFiltradas"
            [class.pasta-selecionada]="pasta.nome === pastaSelecionada"
            (click)="selecionarPasta(pasta.nome)"
          >
            <span class="folder-icon" aria-hidden="true"></span>
            <span>{{ pasta.nome }}</span>
          </button>
        </div>
      </div>

      <!-- CRIAR PASTA -->
      <div class="container-create-folder">
        <button
          type="button"
          class="button-create-folder"
          (click)="criarPasta()"
        >
          CRIAR
        </button>
      </div>
    </section>
  </div>
</ion-content>
