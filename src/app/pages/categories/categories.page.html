<ion-content [fullscreen]="true">
  <!-- Container voltar -->
  <div class="container-back-button">
    <div class="block"></div>

    <div class="content-wrapper">
      <div class="back-button-svg-wrapper">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#ffffff33"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </div>

      <div class="back-button-text-wrapper">
        <span class="back-button-text">Voltar</span>
      </div>
    </div>
    <div class="block"></div>
  </div>

  <!-- Container gêneros -->
  <div class="container-categories">
    <div class="block"></div>

    <div class="content-wrapper-categories">
      <div class="categories"><span class="categories-text">Filmes</span></div>
      <div class="categories"><span class="categories-text">Séries</span></div>
      <div class="categories"><span class="categories-text">Animes</span></div>
    </div>

    <div class="block"></div>
  </div>
</ion-content>
