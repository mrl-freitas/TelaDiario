<ion-content [fullscreen]="true">

  <section class="detalhes-filme">
    <div class="banner-filme">
      <img
        [src]="imagemBanner"
        [alt]="filme.title">

      <ion-button fill="clear" class="botao-voltar" (click)="voltar()">
        <span aria-hidden="true">&lt;</span>
      </ion-button>
    </div>

    <div class="conteudo-filme">
      <div class="cabecalho-filme">
        <h1>{{ filme.title }}</h1>

        <div class="acoes-filme">
          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="alternarAssistir()">
            <img
              [src]="filme.assistir ? 'assets/icon/Assistir_marcado.png' : 'assets/icon/Assistir.png'"
              [alt]="filme.assistir ? 'Remover de assistir' : 'Marcar para assistir'">
          </ion-button>

          <ion-button
            fill="clear"
            class="botao-acao"
            (click)="alternarFavorito()">
            <img
              [src]="filme.favorito ? 'assets/icon/Favorito_marcado.png' : 'assets/icon/Favorito.png'"
              [alt]="filme.favorito ? 'Escolher outra pasta favorita' : 'Escolher pasta favorita'">
          </ion-button>
        </div>
      </div>

      <p class="sinopse">
        {{ sinopse }}
      </p>

      <button type="button" class="ver-mais">
        Ver mais
      </button>
    </div>
  </section>

  <div
    class="fundo-seletor-pastas"
    *ngIf="seletorPastasAberto"
    (click)="fecharSeletorPastas()">
    <section
      class="seletor-pastas"
      role="dialog"
      aria-modal="true"
      aria-labelledby="titulo-pastas"
      (click)="$event.stopPropagation()">
      <button
        type="button"
        class="fechar-seletor"
        aria-label="Fechar"
        (click)="fecharSeletorPastas()">
        &times;
      </button>

      <input
        type="search"
        class="campo-busca-pasta"
        placeholder="Pesquisar..."
        [value]="buscaPasta"
        (input)="atualizarBuscaPasta($event)">

      <h2 id="titulo-pastas">Pastas</h2>

      <div class="lista-pastas">
        <button
          type="button"
          class="item-pasta"
          *ngFor="let pasta of pastasFiltradas"
          [class.pasta-selecionada]="pasta.nome === pastaFavoritaSelecionada"
          (click)="selecionarPasta(pasta.nome)">
          <span class="icone-pasta" aria-hidden="true"></span>
          <span>{{ pasta.nome }}</span>
        </button>
      </div>

      <button
        type="button"
        class="botao-criar-pasta"
        (click)="criarPasta()">
        CRIAR
      </button>
    </section>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <nav class="navegacao-inferior" aria-label="Navegacao principal">
      <ion-button fill="clear" class="botao-navegacao" (click)="navegarPara('/home')">
        <img
          src="assets/icon/P%C3%A1gina%20inicial.png"
          alt="Pagina inicial">
      </ion-button>

      <ion-button fill="clear" class="botao-navegacao" (click)="navegarPara('/search')">
        <img
          src="assets/icon/Pesquisa.png"
          alt="Pesquisa">
      </ion-button>

      <ion-button fill="clear" class="botao-navegacao" (click)="navegarPara('/categories')">
        <img
          src="assets/icon/Folder.png"
          alt="Folder">
      </ion-button>

      <ion-button fill="clear" class="botao-navegacao" (click)="navegarPara('/perfil')">
        <img
          src="assets/icon/Perfil.png"
          alt="Perfil">
      </ion-button>
    </nav>
  </ion-toolbar>
</ion-footer>
